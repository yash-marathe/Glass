name: Build & Release Linux

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.0.17). Leave empty for dev build."
        required: false
      attach_to_release:
        description: "Attach artifacts to an existing GitHub Release with this tag"
        required: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CARGO_INCREMENTAL: "0"
  CC: clang
  CXX: clang++

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            musl_target: x86_64-unknown-linux-musl
            cef_platform: linux64
          # Uncomment when an ARM64 runner is available:
          # - arch: aarch64
          #   runner: ubuntu-22.04-arm64
          #   target: aarch64-unknown-linux-gnu
          #   musl_target: aarch64-unknown-linux-musl
          #   cef_platform: linuxarm64

    steps:
      - uses: actions/checkout@v4
        with:
          clean: false

      - name: Install system dependencies
        run: |
          ./script/linux
          sudo apt-get install -y ninja-build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }},${{ matrix.musl_target }}

      - name: Download WASI SDK
        run: ./script/download-wasi-sdk

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-linux-${{ matrix.arch }}

      # ── CEF ──────────────────────────────────────────────────────────
      - name: Cache CEF
        id: cache-cef
        uses: actions/cache@v4
        with:
          path: ~/.local/share/cef
          key: cef-${{ matrix.cef_platform }}-v145.0.28

      - name: Download CEF
        if: steps.cache-cef.outputs.cache-hit != 'true'
        run: |
          CEF_PATH="$HOME/.local/share/cef"
          mkdir -p "$CEF_PATH"

          CEF_VERSION="145.0.28"
          CEF_CDN="https://cef-builds.spotifycdn.com"
          INDEX_JSON=$(curl -sL "$CEF_CDN/index.json")

          CEF_FILE=$(echo "$INDEX_JSON" | jq -r \
            '.${{ matrix.cef_platform }}.versions[]
             | select(.cef_version | startswith("'"$CEF_VERSION"'+"))
             | .files[] | select(.type == "minimal") | .name' | head -1)

          CEF_SHA1=$(echo "$INDEX_JSON" | jq -r \
            '.${{ matrix.cef_platform }}.versions[]
             | select(.cef_version | startswith("'"$CEF_VERSION"'+"))
             | .files[] | select(.type == "minimal") | .sha1' | head -1)

          if [ -z "$CEF_FILE" ] || [ "$CEF_FILE" = "null" ]; then
            echo "Error: Could not find CEF $CEF_VERSION for ${{ matrix.cef_platform }}"
            exit 1
          fi

          echo "Downloading CEF: $CEF_FILE"
          curl -L -o /tmp/cef.tar.bz2 "$CEF_CDN/$CEF_FILE"

          DOWNLOADED_SHA1=$(sha1sum /tmp/cef.tar.bz2 | cut -d' ' -f1)
          if [ "$DOWNLOADED_SHA1" != "$CEF_SHA1" ]; then
            echo "SHA1 mismatch: expected $CEF_SHA1, got $DOWNLOADED_SHA1"
            exit 1
          fi

          cd /tmp && tar -xjf cef.tar.bz2
          EXTRACTED_DIR=$(ls -d cef_binary_* | head -1)

          cp -R "/tmp/$EXTRACTED_DIR/Release/"* "$CEF_PATH/"
          cp -R "/tmp/$EXTRACTED_DIR/Resources/"* "$CEF_PATH/"
          cp -R "/tmp/$EXTRACTED_DIR/include" "$CEF_PATH/" || true
          cp -R "/tmp/$EXTRACTED_DIR/libcef_dll" "$CEF_PATH/" || true
          cp -R "/tmp/$EXTRACTED_DIR/cmake" "$CEF_PATH/" || true
          cp "/tmp/$EXTRACTED_DIR/CMakeLists.txt" "$CEF_PATH/" || true

          # Create archive.json — required by cef-dll-sys build.rs
          echo '{"type":"minimal","name":"'"$CEF_FILE"'","sha1":"'"$CEF_SHA1"'"}' > "$CEF_PATH/archive.json"

          rm -rf /tmp/cef.tar.bz2 "/tmp/$EXTRACTED_DIR"
          echo "CEF extracted to $CEF_PATH"
          ls "$CEF_PATH"

      # ── Patch missing file in Glass-HQ/gpui fork ─────────────────
      - name: Patch gpui fork (add missing layer_shell.rs)
        run: |
          # The Glass-HQ/gpui fork is missing layer_shell.rs which is needed
          # when the wayland feature is enabled on Linux. We fetch the cargo
          # git checkout and add the file before building.
          # First, trigger cargo to fetch the gpui dependency
          cargo fetch 2>/dev/null || true

          # Find the gpui checkout directory
          GPUI_DIR=$(find ~/.cargo/git/checkouts -path "*/gpui*/crates/gpui/src/platform" -type d 2>/dev/null | head -1)
          if [ -n "$GPUI_DIR" ] && [ ! -f "$GPUI_DIR/layer_shell.rs" ]; then
            echo "Adding missing layer_shell.rs to $GPUI_DIR"
            cat > "$GPUI_DIR/layer_shell.rs" << 'LAYERSHELL'
          use bitflags::bitflags;
          use thiserror::Error;

          use crate::Pixels;

          #[derive(Copy, Clone, Debug, Default, PartialEq, Eq)]
          pub enum Layer {
              Background,
              Bottom,
              Top,
              #[default]
              Overlay,
          }

          bitflags! {
              #[derive(Copy, Clone, Debug, Default, PartialEq, Eq)]
              pub struct Anchor: u32 {
                  const TOP = 1;
                  const BOTTOM = 2;
                  const LEFT = 4;
                  const RIGHT = 8;
              }
          }

          #[derive(Copy, Clone, Debug, Default, PartialEq, Eq)]
          pub enum KeyboardInteractivity {
              None,
              Exclusive,
              #[default]
              OnDemand,
          }

          #[derive(Clone, Debug, Default, PartialEq, Eq)]
          pub struct LayerShellOptions {
              pub namespace: String,
              pub layer: Layer,
              pub anchor: Anchor,
              pub exclusive_zone: Option<Pixels>,
              pub exclusive_edge: Option<Anchor>,
              pub margin: Option<(Pixels, Pixels, Pixels, Pixels)>,
              pub keyboard_interactivity: KeyboardInteractivity,
          }

          #[derive(Debug, Error)]
          #[error("Compositor doesn't support zwlr_layer_shell_v1")]
          pub struct LayerShellNotSupportedError;
          LAYERSHELL
            sed -i 's/^          //' "$GPUI_DIR/layer_shell.rs"
            echo "layer_shell.rs patched successfully"
          else
            echo "layer_shell.rs already exists or gpui checkout not found"
          fi

      # ── Build ────────────────────────────────────────────────────────
      - name: Build Glass
        run: |
          export CEF_PATH="$HOME/.local/share/cef"
          export LD_LIBRARY_PATH="${LD_LIBRARY_PATH:+$LD_LIBRARY_PATH:}$CEF_PATH"
          export ZED_BUNDLE=true

          VERSION="${{ github.event.inputs.version }}"
          export RELEASE_VERSION="${VERSION:-0.0.0-dev}"

          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            export RUSTFLAGS="${RUSTFLAGS:-} -C link-arg=-fuse-ld=lld -C link-args=-Wl,--disable-new-dtags,-rpath,\$ORIGIN/../lib"
          else
            export RUSTFLAGS="${RUSTFLAGS:-} -C link-args=-Wl,--disable-new-dtags,-rpath,\$ORIGIN/../lib"
          fi

          cargo build --release --target ${{ matrix.target }} \
            --package zed --package cli

          cargo build --release --target ${{ matrix.target }} \
            --package browser --bin glass_helper

          # Remote server (musl, statically linked)
          RUSTFLAGS="${RUSTFLAGS:-} -C target-feature=+crt-static" \
            cargo build --release --target ${{ matrix.musl_target }} \
            --package remote_server

      # ── Strip ────────────────────────────────────────────────────────
      - name: Strip binaries
        run: |
          target_dir="${CARGO_TARGET_DIR:-target}"
          for bin in zed cli glass_helper; do
            llvm-objcopy --strip-debug "${target_dir}/${{ matrix.target }}/release/${bin}" 2>/dev/null || \
              strip --strip-debug "${target_dir}/${{ matrix.target }}/release/${bin}" || true
          done
          llvm-objcopy --strip-debug "${target_dir}/${{ matrix.musl_target }}/release/remote_server" 2>/dev/null || \
            strip --strip-debug "${target_dir}/${{ matrix.musl_target }}/release/remote_server" || true

      # ── Package: .deb ────────────────────────────────────────────────
      - name: Build .deb package
        run: |
          export CEF_PATH="$HOME/.local/share/cef"
          target_dir="${CARGO_TARGET_DIR:-target}"
          arch="${{ matrix.arch }}"
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION:-0.0.0-dev}"
          VERSION="${VERSION#v}"  # strip leading v

          if [ "$arch" = "x86_64" ]; then
            DEB_ARCH="amd64"
          else
            DEB_ARCH="arm64"
          fi

          PKG_ROOT=$(mktemp -d)
          PKG_NAME="glass_${VERSION}_${DEB_ARCH}"

          # ── DEBIAN control ──
          mkdir -p "$PKG_ROOT/DEBIAN"
          cat > "$PKG_ROOT/DEBIAN/control" << EOF
          Package: glass
          Version: ${VERSION}
          Section: editors
          Priority: optional
          Architecture: ${DEB_ARCH}
          Depends: libasound2, libfontconfig1, libvulkan1, libwayland-client0, libxkbcommon-x11-0, libssl3
          Maintainer: Glass <hello@glass.dev>
          Description: Glass - A high-performance code editor with built-in browser
           Glass is a fork of Zed with an integrated CEF-based browser.
          EOF
          # Remove leading whitespace from heredoc (dpkg-deb is picky)
          sed -i 's/^          //' "$PKG_ROOT/DEBIAN/control"

          # ── /usr/lib/glass/ — main binaries + CEF runtime ──
          LIBDIR="$PKG_ROOT/usr/lib/glass"
          mkdir -p "$LIBDIR"

          cp "${target_dir}/${{ matrix.target }}/release/zed" "$LIBDIR/glass-editor"
          cp "${target_dir}/${{ matrix.target }}/release/glass_helper" "$LIBDIR/glass_helper"

          # CEF shared objects
          cp "$CEF_PATH"/libcef.so "$LIBDIR/"
          cp "$CEF_PATH"/libEGL.so "$LIBDIR/" 2>/dev/null || true
          cp "$CEF_PATH"/libGLESv2.so "$LIBDIR/" 2>/dev/null || true
          cp "$CEF_PATH"/libvk_swiftshader.so "$LIBDIR/" 2>/dev/null || true
          cp "$CEF_PATH"/libvulkan.so.1 "$LIBDIR/" 2>/dev/null || true
          cp "$CEF_PATH"/chrome-sandbox "$LIBDIR/" 2>/dev/null || true
          cp "$CEF_PATH"/v8_context_snapshot.bin "$LIBDIR/" 2>/dev/null || true
          cp "$CEF_PATH"/snapshot_blob.bin "$LIBDIR/" 2>/dev/null || true

          # CEF resources
          cp "$CEF_PATH"/*.pak "$LIBDIR/" 2>/dev/null || true
          cp "$CEF_PATH"/*.dat "$LIBDIR/" 2>/dev/null || true
          cp -r "$CEF_PATH"/locales "$LIBDIR/" 2>/dev/null || true

          # ── /usr/bin/glass — CLI wrapper ──
          mkdir -p "$PKG_ROOT/usr/bin"
          cp "${target_dir}/${{ matrix.target }}/release/cli" "$PKG_ROOT/usr/bin/glass"

          # ── .desktop file ──
          mkdir -p "$PKG_ROOT/usr/share/applications"
          cat > "$PKG_ROOT/usr/share/applications/dev.glass.Glass.desktop" << 'DESK'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Glass
          GenericName=Text Editor
          Comment=A high-performance code editor with built-in browser.
          TryExec=glass
          StartupNotify=true
          Exec=glass %U
          Icon=glass
          Categories=Utility;TextEditor;Development;IDE;
          Keywords=glass;editor;code;
          MimeType=text/plain;application/x-zerosize;
          Actions=NewWorkspace;

          [Desktop Action NewWorkspace]
          Exec=glass --new %U
          Name=Open a new workspace
          DESK
          sed -i 's/^          //' "$PKG_ROOT/usr/share/applications/dev.glass.Glass.desktop"

          # ── Icons ──
          for size in 512 1024; do
            mkdir -p "$PKG_ROOT/usr/share/icons/hicolor/${size}x${size}/apps"
          done
          cp "crates/zed/resources/app-icon.png" \
            "$PKG_ROOT/usr/share/icons/hicolor/512x512/apps/glass.png"
          cp "crates/zed/resources/app-icon@2x.png" \
            "$PKG_ROOT/usr/share/icons/hicolor/1024x1024/apps/glass.png"

          # ── Licenses ──
          mkdir -p "$PKG_ROOT/usr/share/doc/glass"
          cp "assets/licenses.md" "$PKG_ROOT/usr/share/doc/glass/" 2>/dev/null || true

          # ── Build .deb ──
          dpkg-deb --build --root-owner-group "$PKG_ROOT" "${target_dir}/release/${PKG_NAME}.deb"

          echo "DEB_PATH=${target_dir}/release/${PKG_NAME}.deb" >> $GITHUB_ENV
          echo "DEB_NAME=${PKG_NAME}.deb" >> $GITHUB_ENV

      # ── Package: .AppImage ──────────────────────────────────────────
      - name: Build .AppImage
        run: |
          export CEF_PATH="$HOME/.local/share/cef"
          target_dir="${CARGO_TARGET_DIR:-target}"
          arch="${{ matrix.arch }}"
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION:-0.0.0-dev}"
          VERSION="${VERSION#v}"

          # Download appimagetool
          if [ "$arch" = "x86_64" ]; then
            APPIMAGE_TOOL_URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage"
          else
            APPIMAGE_TOOL_URL="https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-aarch64.AppImage"
          fi
          curl -L -o /tmp/appimagetool "$APPIMAGE_TOOL_URL"
          chmod +x /tmp/appimagetool

          # Create AppDir structure
          APPDIR=$(mktemp -d)/Glass.AppDir
          mkdir -p "$APPDIR/usr/bin"
          mkdir -p "$APPDIR/usr/lib/glass"
          mkdir -p "$APPDIR/usr/share/applications"
          mkdir -p "$APPDIR/usr/share/icons/hicolor/512x512/apps"

          # Main binaries
          cp "${target_dir}/${{ matrix.target }}/release/cli" "$APPDIR/usr/bin/glass"
          cp "${target_dir}/${{ matrix.target }}/release/zed" "$APPDIR/usr/lib/glass/glass-editor"
          cp "${target_dir}/${{ matrix.target }}/release/glass_helper" "$APPDIR/usr/lib/glass/glass_helper"

          # CEF runtime
          cp "$CEF_PATH"/libcef.so "$APPDIR/usr/lib/glass/"
          cp "$CEF_PATH"/libEGL.so "$APPDIR/usr/lib/glass/" 2>/dev/null || true
          cp "$CEF_PATH"/libGLESv2.so "$APPDIR/usr/lib/glass/" 2>/dev/null || true
          cp "$CEF_PATH"/libvk_swiftshader.so "$APPDIR/usr/lib/glass/" 2>/dev/null || true
          cp "$CEF_PATH"/libvulkan.so.1 "$APPDIR/usr/lib/glass/" 2>/dev/null || true
          cp "$CEF_PATH"/v8_context_snapshot.bin "$APPDIR/usr/lib/glass/" 2>/dev/null || true
          cp "$CEF_PATH"/snapshot_blob.bin "$APPDIR/usr/lib/glass/" 2>/dev/null || true
          cp "$CEF_PATH"/*.pak "$APPDIR/usr/lib/glass/" 2>/dev/null || true
          cp "$CEF_PATH"/*.dat "$APPDIR/usr/lib/glass/" 2>/dev/null || true
          cp -r "$CEF_PATH"/locales "$APPDIR/usr/lib/glass/" 2>/dev/null || true

          # Desktop file (top-level for AppImage)
          cat > "$APPDIR/dev.glass.Glass.desktop" << 'DESK'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Glass
          GenericName=Text Editor
          Comment=A high-performance code editor with built-in browser.
          Exec=glass %U
          Icon=glass
          Categories=Utility;TextEditor;Development;IDE;
          DESK
          sed -i 's/^          //' "$APPDIR/dev.glass.Glass.desktop"
          cp "$APPDIR/dev.glass.Glass.desktop" "$APPDIR/usr/share/applications/"

          # Icon (top-level for AppImage)
          cp "crates/zed/resources/app-icon.png" "$APPDIR/glass.png"
          cp "crates/zed/resources/app-icon.png" "$APPDIR/usr/share/icons/hicolor/512x512/apps/glass.png"

          # AppRun script
          cat > "$APPDIR/AppRun" << 'APPRUN'
          #!/bin/bash
          SELF_DIR="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="${SELF_DIR}/usr/lib/glass:${LD_LIBRARY_PATH}"
          export CEF_PATH="${SELF_DIR}/usr/lib/glass"
          exec "${SELF_DIR}/usr/bin/glass" "$@"
          APPRUN
          chmod +x "$APPDIR/AppRun"

          # Build AppImage
          APPIMAGE_NAME="Glass-${VERSION}-${arch}.AppImage"
          ARCH=$arch /tmp/appimagetool --no-appstream "$APPDIR" "${target_dir}/release/${APPIMAGE_NAME}" \
            || /tmp/appimagetool --appimage-extract-and-run --no-appstream "$APPDIR" "${target_dir}/release/${APPIMAGE_NAME}"

          echo "APPIMAGE_PATH=${target_dir}/release/${APPIMAGE_NAME}" >> $GITHUB_ENV
          echo "APPIMAGE_NAME=${APPIMAGE_NAME}" >> $GITHUB_ENV

      # ── Also produce .tar.gz (for users who prefer manual install) ──
      - name: Build .tar.gz bundle
        run: |
          export CEF_PATH="$HOME/.local/share/cef"
          target_dir="${CARGO_TARGET_DIR:-target}"
          arch="${{ matrix.arch }}"
          VERSION="${{ github.event.inputs.version }}"
          VERSION="${VERSION:-0.0.0-dev}"
          VERSION="${VERSION#v}"

          temp_dir=$(mktemp -d)
          app_dir="${temp_dir}/glass"

          mkdir -p "${app_dir}/bin" "${app_dir}/lib" "${app_dir}/libexec"
          mkdir -p "${app_dir}/share/applications"
          mkdir -p "${app_dir}/share/icons/hicolor/512x512/apps"
          mkdir -p "${app_dir}/share/icons/hicolor/1024x1024/apps"

          # Binaries
          cp "${target_dir}/${{ matrix.target }}/release/cli" "${app_dir}/bin/glass"
          cp "${target_dir}/${{ matrix.target }}/release/zed" "${app_dir}/libexec/glass-editor"
          cp "${target_dir}/${{ matrix.target }}/release/glass_helper" "${app_dir}/libexec/glass_helper"

          # CEF runtime
          cp "$CEF_PATH"/libcef.so "${app_dir}/lib/"
          cp "$CEF_PATH"/libEGL.so "${app_dir}/lib/" 2>/dev/null || true
          cp "$CEF_PATH"/libGLESv2.so "${app_dir}/lib/" 2>/dev/null || true
          cp "$CEF_PATH"/libvk_swiftshader.so "${app_dir}/lib/" 2>/dev/null || true
          cp "$CEF_PATH"/libvulkan.so.1 "${app_dir}/lib/" 2>/dev/null || true
          cp "$CEF_PATH"/*.pak "${app_dir}/lib/" 2>/dev/null || true
          cp "$CEF_PATH"/*.dat "${app_dir}/lib/" 2>/dev/null || true
          cp "$CEF_PATH"/*.bin "${app_dir}/lib/" 2>/dev/null || true
          cp -r "$CEF_PATH"/locales "${app_dir}/lib/" 2>/dev/null || true

          # Desktop + icons
          cat > "${app_dir}/share/applications/dev.glass.Glass.desktop" << 'DESK'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=Glass
          Exec=glass %U
          Icon=glass
          Categories=Utility;TextEditor;Development;IDE;
          DESK
          sed -i 's/^          //' "${app_dir}/share/applications/dev.glass.Glass.desktop"

          cp "crates/zed/resources/app-icon.png" \
            "${app_dir}/share/icons/hicolor/512x512/apps/glass.png"
          cp "crates/zed/resources/app-icon@2x.png" \
            "${app_dir}/share/icons/hicolor/1024x1024/apps/glass.png"

          cp "assets/licenses.md" "${app_dir}/" 2>/dev/null || true

          TARBALL="Glass-${VERSION}-linux-${arch}.tar.gz"
          tar -czvf "${target_dir}/release/${TARBALL}" -C "${temp_dir}" glass

          echo "TARBALL_PATH=${target_dir}/release/${TARBALL}" >> $GITHUB_ENV
          echo "TARBALL_NAME=${TARBALL}" >> $GITHUB_ENV

      # ── Remote server ────────────────────────────────────────────────
      - name: Package remote server
        run: |
          target_dir="${CARGO_TARGET_DIR:-target}"
          arch="${{ matrix.arch }}"
          gzip -f --stdout --best \
            "${target_dir}/${{ matrix.musl_target }}/release/remote_server" \
            > "${target_dir}/release/glass-remote-server-linux-${arch}.gz"

          echo "REMOTE_SERVER_PATH=${target_dir}/release/glass-remote-server-linux-${arch}.gz" >> $GITHUB_ENV

      # ── Upload artifacts ─────────────────────────────────────────────
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEB_NAME }}
          path: ${{ env.DEB_PATH }}
          if-no-files-found: error

      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APPIMAGE_NAME }}
          path: ${{ env.APPIMAGE_PATH }}
          if-no-files-found: error

      - name: Upload .tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARBALL_NAME }}
          path: ${{ env.TARBALL_PATH }}
          if-no-files-found: error

      - name: Upload remote server
        uses: actions/upload-artifact@v4
        with:
          name: glass-remote-server-linux-${{ matrix.arch }}.gz
          path: ${{ env.REMOTE_SERVER_PATH }}
          if-no-files-found: error

    timeout-minutes: 90

  # ─────────────────────────────────────────────────────────────────────
  # Attach to GitHub Release (only if a version tag was provided)
  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Attach to GitHub Release
    if: github.event.inputs.version != '' || github.event.inputs.attach_to_release != ''
    needs: [build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine release tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.attach_to_release }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.event.inputs.version }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create or update release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Glass ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.tar.gz
            artifacts/**/*.gz
          body: |
            ## Glass ${{ steps.tag.outputs.tag }} — Linux

            ### Downloads
            | Format | Description |
            |--------|-------------|
            | `.deb` | Debian/Ubuntu — install with `sudo dpkg -i glass_*.deb` |
            | `.AppImage` | Portable — `chmod +x Glass-*.AppImage && ./Glass-*.AppImage` |
            | `.tar.gz` | Manual install — extract and add `bin/` to PATH |

            ### Requirements
            - Vulkan-capable GPU driver
            - Wayland or X11 display server
            - glibc 2.31+ (Ubuntu 22.04+, Fedora 36+, etc.)
