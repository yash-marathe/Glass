name: Release Glass

on:
  push:
    tags:
      - "v0.0.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v0.0.16)"
        required: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CARGO_INCREMENTAL: "0"
  CXXFLAGS: "-stdlib=libc++"
  RELEASE_VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  build-macos:
    name: Build macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-26
            arch: aarch64
            cef_platform: macosarm64
          # Intel build disabled for now - uncomment to re-enable
          # - target: x86_64-apple-darwin
          #   runner: macos-14
          #   arch: x86_64
          #   cef_platform: macosx64

    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
      APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
      APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # sccache provides remote compilation caching via Cloudflare R2.
      # This is the single biggest build speedup: unchanged crates are
      # fetched from the cache instead of recompiled from scratch.
      - name: Cache sccache binary
        id: cache-sccache
        uses: actions/cache@v4
        with:
          path: target/sccache
          key: sccache-${{ runner.os }}-${{ runner.arch }}-v0.10.0

      - name: Setup sccache
        run: ./script/setup-sccache
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          SCCACHE_BUCKET: sccache-glass

      # Cache cargo registry AND target/ directory. sccache handles remote
      # compilation caching, but target/ caching preserves proc-macros,
      # fingerprints, and linker artifacts that sccache can't cache.
      # This lets cargo skip unchanged crates entirely (~40+ min saved).
      - name: Cache Rust dependencies and target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          # Only cache dependency artifacts, not workspace crates (which change each release)
          cache-targets: true
          cache-all-crates: true

      # Cache cargo-about to avoid rebuilding from source every time.
      - name: Cache cargo tools
        id: cache-cargo-tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-about
            ~/.cargo/.crates.toml
            ~/.cargo/.crates2.json
          key: cargo-tools-${{ runner.os }}-${{ runner.arch }}-about-0.8.2

      - name: Install cargo-about
        if: steps.cache-cargo-tools.outputs.cache-hit != 'true'
        run: cargo install "cargo-about@0.8.2"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Cache Homebrew packages
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/cmake
          key: homebrew-${{ runner.os }}-${{ runner.arch }}-cmake-v1

      - name: Install cmake
        run: brew install cmake || true

      # Cache generated licenses — only changes when Cargo.lock changes.
      - name: Cache licenses
        id: cache-licenses
        uses: actions/cache@v4
        with:
          path: assets/licenses.md
          key: licenses-${{ hashFiles('Cargo.lock', 'script/licenses/**') }}

      - name: Generate licenses
        if: steps.cache-licenses.outputs.cache-hit != 'true'
        run: script/generate-licenses

      # Cache stock CEF 145 headers for building libcef_dll_wrapper
      - name: Cache CEF build headers
        id: cache-cef-headers
        uses: actions/cache@v4
        with:
          path: ~/.local/share/cef
          key: cef-stock-${{ matrix.cef_platform }}-v145.0.28

      - name: Download stock CEF runtime for build and bundle
        run: |
          CEF_PATH="$HOME/.local/share/cef"
          mkdir -p "$CEF_PATH"
          echo "CEF_PATH=$CEF_PATH" >> $GITHUB_ENV

          if [ -f "$CEF_PATH/include/cef_version.h" ]; then
            echo "CEF runtime found in cache"
          else
            echo "Downloading stock CEF 145 runtime from Spotify CDN..."
            CEF_VERSION="145.0.28"
            CEF_CDN="https://cef-builds.spotifycdn.com"

            INDEX_JSON=$(curl -sL "$CEF_CDN/index.json")

            if [ "${{ matrix.cef_platform }}" = "macosarm64" ]; then
              CEF_FILE=$(echo "$INDEX_JSON" | jq -r '.macosarm64.versions[] | select(.cef_version | startswith("'"$CEF_VERSION"'+")) | .files[] | select(.type == "minimal") | .name' | head -1)
              CEF_SHA1=$(echo "$INDEX_JSON" | jq -r '.macosarm64.versions[] | select(.cef_version | startswith("'"$CEF_VERSION"'+")) | .files[] | select(.type == "minimal") | .sha1' | head -1)
            else
              CEF_FILE=$(echo "$INDEX_JSON" | jq -r '.macosx64.versions[] | select(.cef_version | startswith("'"$CEF_VERSION"'+")) | .files[] | select(.type == "minimal") | .name' | head -1)
              CEF_SHA1=$(echo "$INDEX_JSON" | jq -r '.macosx64.versions[] | select(.cef_version | startswith("'"$CEF_VERSION"'+")) | .files[] | select(.type == "minimal") | .sha1' | head -1)
            fi

            if [ -z "$CEF_FILE" ] || [ "$CEF_FILE" = "null" ]; then
              echo "Error: Could not find CEF version $CEF_VERSION for ${{ matrix.cef_platform }}"
              exit 1
            fi

            echo "Downloading: $CEF_FILE"
            curl -L -o "/tmp/cef.tar.bz2" "$CEF_CDN/$CEF_FILE"

            DOWNLOADED_SHA1=$(shasum -a 1 /tmp/cef.tar.bz2 | cut -d' ' -f1)
            if [ "$DOWNLOADED_SHA1" != "$CEF_SHA1" ]; then
              echo "Error: SHA1 mismatch. Expected $CEF_SHA1, got $DOWNLOADED_SHA1"
              exit 1
            fi

            cd /tmp && tar -xjf cef.tar.bz2
            EXTRACTED_DIR=$(ls -d cef_binary_* | head -1)

            # Copy headers, cmake, and build files (needed by cef-dll-sys)
            cp -R "/tmp/$EXTRACTED_DIR/Release/"* "$CEF_PATH/"
            cp "/tmp/$EXTRACTED_DIR/CMakeLists.txt" "$CEF_PATH/" || true
            cp -R "/tmp/$EXTRACTED_DIR/cmake" "$CEF_PATH/" || true
            cp -R "/tmp/$EXTRACTED_DIR/include" "$CEF_PATH/" || true
            cp -R "/tmp/$EXTRACTED_DIR/libcef_dll" "$CEF_PATH/" || true
            echo '{"type":"minimal","name":"'"$CEF_FILE"'","sha1":"'"$CEF_SHA1"'"}' > "$CEF_PATH/archive.json"

            rm -rf /tmp/cef.tar.bz2 "/tmp/$EXTRACTED_DIR"
          fi

          echo "CEF runtime ready at: $CEF_PATH"

      - name: Build Glass
        run: |
          export ZED_BUNDLE=true
          cargo build --release --features mimalloc --package zed --package cli --target ${{ matrix.target }}
          cargo build --release --package remote_server --target ${{ matrix.target }}
          cargo build --release --package browser --bin glass_helper --target ${{ matrix.target }}

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

      - name: Generate debug symbols (for crash reports)
        run: |
          SYMBOLS_DIR="target/${{ matrix.target }}/release/symbols"
          SYMBOLS_ZIP="target/${{ matrix.target }}/release/Glass-${{ matrix.arch }}-symbols.zip"
          rm -rf "$SYMBOLS_DIR"
          mkdir -p "$SYMBOLS_DIR"

          # Match Zed's approach: produce flat .dwarf files suitable for symbolication tooling.
          dsymutil --flat -o "$SYMBOLS_DIR/zed.dwarf" "target/${{ matrix.target }}/release/zed"
          dsymutil --flat -o "$SYMBOLS_DIR/cli.dwarf" "target/${{ matrix.target }}/release/cli"
          dsymutil --flat -o "$SYMBOLS_DIR/remote_server.dwarf" "target/${{ matrix.target }}/release/remote_server"
          dsymutil --flat -o "$SYMBOLS_DIR/glass_helper.dwarf" "target/${{ matrix.target }}/release/glass_helper"

          ditto -c -k --sequesterRsrc --keepParent "$SYMBOLS_DIR" "$SYMBOLS_ZIP"

      - name: Create app bundle
        run: |
          # Build the .app bundle structure manually instead of using cargo bundle,
          # which would recompile+relink the zed binary (~20 min) only to have it
          # replaced in the next step anyway.
          APP_PATH="target/${{ matrix.target }}/release/bundle/osx/Glass.app"
          mkdir -p "$APP_PATH/Contents/MacOS"
          mkdir -p "$APP_PATH/Contents/Resources"
          mkdir -p "$APP_PATH/Contents/Frameworks"

          echo "APPL????" > "$APP_PATH/Contents/PkgInfo"

          # Convert PNG icon to .icns using macOS iconutil
          ICONSET_DIR=$(mktemp -d)/Glass.iconset
          mkdir -p "$ICONSET_DIR"
          ICON_SRC_2X="crates/zed/resources/app-icon@2x.png"
          # iconutil requires these exact sizes: 16, 32, 128, 256, 512 (+ @2x variants)
          for size in 16 32 128 256 512; do
            sips -z $size $size "$ICON_SRC_2X" --out "$ICONSET_DIR/icon_${size}x${size}.png" > /dev/null 2>&1
          done
          for size in 16 32 128 256; do
            double=$((size * 2))
            sips -z $double $double "$ICON_SRC_2X" --out "$ICONSET_DIR/icon_${size}x${size}@2x.png" > /dev/null 2>&1
          done
          # 512@2x = 1024x1024 (the original source)
          cp "$ICON_SRC_2X" "$ICONSET_DIR/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET_DIR" -o "$APP_PATH/Contents/Resources/Glass.icns"
          echo "Generated Glass.icns"

          # Generate Info.plist with all bundle metadata and plist extensions merged
          cat > "$APP_PATH/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleDevelopmentRegion</key>
              <string>en</string>
              <key>CFBundleDisplayName</key>
              <string>Glass</string>
              <key>CFBundleExecutable</key>
              <string>Glass</string>
              <key>CFBundleIconFile</key>
              <string>Glass.icns</string>
              <key>CFBundleIdentifier</key>
              <string>dev.glass.Glass</string>
              <key>CFBundleInfoDictionaryVersion</key>
              <string>6.0</string>
              <key>CFBundleName</key>
              <string>Glass</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>0.0.1</string>
              <key>CFBundleVersion</key>
              <string>0.0.1</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.15.7</string>
              <key>NSHighResolutionCapable</key>
              <true/>
              <key>CFBundleURLTypes</key>
              <array>
                  <dict>
                      <key>CFBundleURLName</key>
                      <string>dev.glass.Glass</string>
                      <key>CFBundleURLSchemes</key>
                      <array>
                          <string>glass</string>
                          <string>http</string>
                          <string>https</string>
                      </array>
                  </dict>
              </array>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>MacOSX</string>
              </array>
              <key>LSEnvironment</key>
              <dict>
                  <key>MallocNanoZone</key>
                  <string>0</string>
              </dict>
              <key>NSSystemAdministrationUsageDescription</key>
              <string>The operation being performed by a program in Glass requires elevated permission.</string>
              <key>NSAppleEventsUsageDescription</key>
              <string>An application in Glass wants to use AppleScript.</string>
              <key>NSBluetoothAlwaysUsageDescription</key>
              <string>An application in Glass wants to use Bluetooth.</string>
              <key>NSCalendarsUsageDescription</key>
              <string>An application in Glass wants to use Calendar data.</string>
              <key>NSCameraUsageDescription</key>
              <string>An application in Glass wants to use the camera.</string>
              <key>NSContactsUsageDescription</key>
              <string>An application in Glass wants to use your contacts.</string>
              <key>NSLocationAlwaysUsageDescription</key>
              <string>An application in Glass wants to use your location information, even in the background.</string>
              <key>NSLocationUsageDescription</key>
              <string>An application in Glass wants to use your location information.</string>
              <key>NSLocationWhenInUseUsageDescription</key>
              <string>An application in Glass wants to use your location information while active.</string>
              <key>NSMicrophoneUsageDescription</key>
              <string>An application in Glass wants to use your microphone.</string>
              <key>NSSpeechRecognitionUsageDescription</key>
              <string>An application in Glass wants to use speech recognition.</string>
              <key>NSRemindersUsageDescription</key>
              <string>An application in Glass wants to use your reminders.</string>
              <key>CFBundleDocumentTypes</key>
              <array>
                  <dict>
                      <key>CFBundleTypeIconFile</key>
                      <string>Document</string>
                      <key>CFBundleTypeRole</key>
                      <string>Editor</string>
                      <key>LSHandlerRank</key>
                      <string>Alternate</string>
                      <key>LSItemContentTypes</key>
                      <array>
                          <string>public.folder</string>
                          <string>public.plain-text</string>
                          <string>public.text</string>
                          <string>public.utf8-plain-text</string>
                      </array>
                  </dict>
                  <dict>
                      <key>CFBundleTypeIconFile</key>
                      <string>Document</string>
                      <key>CFBundleTypeName</key>
                      <string>Glass Text Document</string>
                      <key>CFBundleTypeRole</key>
                      <string>Editor</string>
                      <key>CFBundleTypeOSTypes</key>
                      <array>
                          <string>****</string>
                      </array>
                      <key>LSHandlerRank</key>
                      <string>Default</string>
                      <key>CFBundleTypeExtensions</key>
                      <array>
                          <string>Gemfile</string>
                          <string>c</string>
                          <string>c++</string>
                          <string>cc</string>
                          <string>cpp</string>
                          <string>css</string>
                          <string>erb</string>
                          <string>ex</string>
                          <string>exs</string>
                          <string>go</string>
                          <string>h</string>
                          <string>h++</string>
                          <string>hh</string>
                          <string>hpp</string>
                          <string>js</string>
                          <string>json</string>
                          <string>jsx</string>
                          <string>md</string>
                          <string>py</string>
                          <string>rb</string>
                          <string>rkt</string>
                          <string>rs</string>
                          <string>scm</string>
                          <string>toml</string>
                          <string>ts</string>
                          <string>tsx</string>
                          <string>txt</string>
                      </array>
                  </dict>
                  <dict>
                      <key>CFBundleTypeName</key>
                      <string>HTML document</string>
                      <key>CFBundleTypeRole</key>
                      <string>Viewer</string>
                      <key>LSHandlerRank</key>
                      <string>Alternate</string>
                      <key>LSItemContentTypes</key>
                      <array>
                          <string>public.html</string>
                      </array>
                      <key>CFBundleTypeExtensions</key>
                      <array>
                          <string>html</string>
                          <string>htm</string>
                          <string>shtml</string>
                      </array>
                      <key>CFBundleTypeMIMETypes</key>
                      <array>
                          <string>text/html</string>
                      </array>
                  </dict>
                  <dict>
                      <key>CFBundleTypeName</key>
                      <string>XHTML document</string>
                      <key>CFBundleTypeRole</key>
                      <string>Viewer</string>
                      <key>LSHandlerRank</key>
                      <string>Alternate</string>
                      <key>LSItemContentTypes</key>
                      <array>
                          <string>public.xhtml</string>
                      </array>
                      <key>CFBundleTypeExtensions</key>
                      <array>
                          <string>xhtml</string>
                          <string>xht</string>
                      </array>
                      <key>CFBundleTypeMIMETypes</key>
                      <array>
                          <string>application/xhtml+xml</string>
                      </array>
                  </dict>
                  <dict>
                      <key>CFBundleTypeName</key>
                      <string>SVG document</string>
                      <key>CFBundleTypeRole</key>
                      <string>Viewer</string>
                      <key>LSHandlerRank</key>
                      <string>Alternate</string>
                      <key>LSItemContentTypes</key>
                      <array>
                          <string>public.svg-image</string>
                      </array>
                  </dict>
                  <dict>
                      <key>CFBundleTypeName</key>
                      <string>PDF document</string>
                      <key>CFBundleTypeRole</key>
                      <string>Viewer</string>
                      <key>LSHandlerRank</key>
                      <string>Alternate</string>
                      <key>LSItemContentTypes</key>
