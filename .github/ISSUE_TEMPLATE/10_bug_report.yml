name: Report a bug
description: Report a problem with Glass.
type: Bug
labels: "bug"
body:
  - type: markdown
    attributes:
      value: |
        Is this bug already reported? Please search first and add a :+1: reaction if you find an existing issue: [search Glass issues](https://github.com/Glass-HQ/Glass/issues).

        Feature request? Please open a [discussion](https://github.com/Glass-HQ/Glass/discussions/new/choose) instead.

        Need help troubleshooting or want to sanity-check whether something is a bug first? Start in [GitHub Discussions](https://github.com/Glass-HQ/Glass/discussions).
  - type: dropdown
    attributes:
      label: Area
      description: Which part of Glass is affected?
      multiple: false
      options:
        - Browser
        - Editor
        - Terminal
        - Native platform tooling
        - AI features
        - Other / not sure
    validations:
      required: false
  - type: textarea
    attributes:
      label: Reproduction steps
      description: A step-by-step description of how to reproduce the bug from a clean Glass install or a minimal project. The more context you provide, the faster this is to verify and fix.
      placeholder: |
        1. Start Glass
        2. Click X
    validations:
      required: true
  - type: textarea
    attributes:
      label: Current vs. Expected behavior
      description: |
        Current behavior (screenshots, videos, etc. are appreciated), vs. what you expected the behavior to be.

      placeholder: |
        Current behavior: <screenshot with an arrow> The icon is blue. Expected behavior: The icon should be red because this is what the setting is documented to do.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Relevant URL, repo, or project context
      description: If this depends on a specific site, repository, project layout, file type, or toolchain, include it here.
      placeholder: |
        - URL:
        - Repository:
        - File type / language:
        - Other context:
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Glass version and system specs
      description: |
        Open the command palette in Glass, then run `zed: copy system specs into clipboard`.
      placeholder: |
        Glass: dev build / release build / commit if known
        OS: macOS 15.1
        Memory: 36 GiB
        Architecture: aarch64
    validations:
      required: true
  - type: textarea
    attributes:
      label: Attach Glass log file
      description: |
        Open the command palette in Glass, then run `zed: open log` to inspect the recent log output. You can also run `zed: reveal log in file manager` to locate the file itself.

        ⚠️ **Please review your log file for secrets (API keys, tokens, etc.) and partially or fully redact them before posting.**
      value: |
        <details><summary>Glass.log</summary>

        <!-- Paste your log inside the code block. -->
        ```log

        ```

        </details>
    validations:
      required: false
  - type: textarea
    attributes:
      label: Relevant settings
      description: |
        Open the command palette in Glass, then run `zed: open settings file` and paste any relevant settings.

        ⚠️ **Please review your settings file for secrets (API keys, tokens, etc.) and partially or fully redact them before posting.**
      value: |
        <details><summary>settings.json</summary>

        <!-- Paste your settings inside the code block. -->
        ```json

        ```

        </details>
    validations:
      required: false
  - type: textarea
    attributes:
      label: Relevant Keymap
      description: |
        Open the command palette in Glass, then run `zed: open keymap file` and paste any relevant keymap changes.
      value: |
        <details><summary>keymap.json</summary>

        <!-- Paste your keymap file inside the code block. -->
        ```json

        ```

        </details>
    validations:
      required: false
  - type: textarea
    attributes:
      label: (for AI issues) Model provider details
      placeholder: |
        - Provider: (Anthropic, OpenAI, Copilot Chat, local model, etc.)
        - Model Name: (Claude Sonnet 4.5, Gemini 3.1 Pro, GPT-5)
        - Mode: (Agent panel, inline assistant, terminal assistant, text threads, browser agent, etc.)
        - Other details (ACPs, MCPs, auth method, settings, etc.):
    validations:
      required: false
